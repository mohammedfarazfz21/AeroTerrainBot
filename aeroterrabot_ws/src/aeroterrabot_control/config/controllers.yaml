# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  AeroTerraBot — ros2_control Controller Configuration                      ║
# ║  Three controllers managed by controller_manager:                          ║
# ║    1. joint_state_broadcaster  – publishes /joint_states for all 12 joints ║
# ║    2. tank_drive_controller    – skid-steer driving in Tank Mode           ║
# ║    3. morph_controller         – trajectory control for transformation     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz — ros2_control loop frequency

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    tank_drive_controller:
      type: diff_drive_controller/DiffDriveController

    morph_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# ── Joint State Broadcaster ──────────────────────────────────────────────────
# Publishes ALL 12 joint states to /joint_states (used by robot_state_publisher)
joint_state_broadcaster:
  ros__parameters:
    use_sim_time: false

# ── Tank Drive Controller (Skid-Steer) ───────────────────────────────────────
# Active in TANK MODE: commands the 4 wheel motors via velocity interface.
# Uses diff_drive_controller in skid-steer configuration (left/right pairs).
tank_drive_controller:
  ros__parameters:
    # Joint mapping — left/right wheel pairs
    left_wheel_names:
      - front_left_wheel_joint
      - rear_left_wheel_joint
    right_wheel_names:
      - front_right_wheel_joint
      - rear_right_wheel_joint

    # Physical parameters (metres & radians)
    wheel_separation: 0.30     # Track width (centre-to-centre)
    wheel_radius: 0.050        # Wheel radius

    # Multipliers for skid-steer correction
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Odometry
    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    open_loop: false
    enable_odom_tf: true

    # Command interface
    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
    velocity_rolling_window_size: 10

    # Limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 1.0           # m/s
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 2.0       # m/s²
    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 3.14         # rad/s
    angular.z.max_acceleration: 6.28     # rad/s²

    use_sim_time: false

# ── Morph Controller (Joint Trajectory) ──────────────────────────────────────
# Controls the 2 servos and 2 linear actuators that perform the physical
# tank ↔ drone transformation. Position-controlled via trajectory waypoints.
morph_controller:
  ros__parameters:
    joints:
      - morph_servo_1_joint
      - morph_servo_2_joint
      - linear_actuator_1_joint
      - linear_actuator_2_joint

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    # Trajectory execution parameters
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0                    # 0 = no time constraint

      morph_servo_1_joint:
        trajectory: 0.05
        goal: 0.02
      morph_servo_2_joint:
        trajectory: 0.05
        goal: 0.02
      linear_actuator_1_joint:
        trajectory: 0.01
        goal: 0.005
      linear_actuator_2_joint:
        trajectory: 0.01
        goal: 0.005

    use_sim_time: false
